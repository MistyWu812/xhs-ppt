<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e}
.slide{width:1280px;height:720px;position:relative;overflow:hidden;color:#e8ecf5;
 font-family:"Noto Sans SC",sans-serif;padding:46px 58px;display:flex;flex-direction:column;
 background:radial-gradient(1100px 620px at 86% -12%,rgba(0,217,255,.14),transparent 58%),
            radial-gradient(820px 520px at -6% 120%,rgba(168,85,247,.12),transparent 55%),
            #1a1a2e;}
.grid{position:absolute;inset:0;pointer-events:none;
 background-image:linear-gradient(rgba(0,217,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(0,217,255,.06) 1px,transparent 1px);
 background-size:48px 48px;-webkit-mask-image:radial-gradient(960px 560px at 72% 18%,#000,transparent 82%)}
.title-font{font-family:"Orbitron","Noto Sans SC",sans-serif}
header{position:relative;z-index:2;margin-bottom:22px}
.kicker{display:inline-flex;align-items:center;gap:8px;background:rgba(0,217,255,.1);border:1px solid rgba(0,217,255,.45);
 color:#00d9ff;padding:7px 16px;border-radius:999px;font-size:14px;font-weight:700;letter-spacing:2px;font-family:"Orbitron","Noto Sans SC"}
.kicker .material-icons{font-size:17px}
h1.t{font-size:38px;font-weight:900;margin-top:15px;line-height:1.22;color:#fff}
h1.t .lv{font-family:"Orbitron";color:#00d9ff;margin-right:8px}
h1.t .o{color:#ff9f00}
.rule{height:3px;width:100%;margin-top:16px;border-radius:3px;background:linear-gradient(90deg,#00d9ff,rgba(0,217,255,0))}
main{position:relative;z-index:2;flex:1;min-height:0}
.pageno{position:absolute;right:50px;bottom:28px;font-family:"Orbitron";font-size:13px;color:rgba(0,217,255,.5);z-index:3;letter-spacing:1px}
.card{background:rgba(0,217,255,.06);border:1px solid rgba(0,217,255,.2);border-radius:14px;padding:20px 22px}
.two{display:grid;grid-template-columns:400px 1fr;gap:22px;height:100%}
.col{display:flex;flex-direction:column;gap:16px;min-height:0}
.chead{display:flex;align-items:center;gap:9px;font-size:18px;font-weight:800;color:#fff;margin-bottom:12px}
.chead .material-icons{color:#00d9ff;font-size:22px}
.def-term{font-size:21px;font-weight:800;color:#fff;margin-bottom:9px}
.def-term em{font-style:normal;color:#00d9ff}
.def-body{font-size:14.5px;line-height:1.7;color:#aab4c8}.def-body b{color:#fff}
.stat{flex:1;display:flex;flex-direction:column;justify-content:center;
 background:linear-gradient(135deg,rgba(0,217,255,.13),rgba(168,85,247,.07));border:1px solid rgba(0,217,255,.3)}
.stat .lab{font-size:15px;color:#9fb0c8;font-weight:700}
.stat .big{font-family:"Orbitron";font-size:52px;font-weight:900;color:#00d9ff;line-height:1.05;margin:8px 0}
.stat .big.o{color:#ff9f00}
.stat .cap{font-size:14px;color:#c5cee0}
.stat .foot{display:flex;align-items:center;gap:7px;font-size:13px;color:#00d9ff;margin-top:12px}
.stat .foot .material-icons{font-size:15px}
.tasks{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.task{display:flex;align-items:center;gap:11px;background:rgba(0,217,255,.06);border-left:3px solid #00d9ff;
 border-radius:8px;padding:14px 15px;font-size:16px;font-weight:600;color:#dbe3f0}
.task .material-icons{color:#00d9ff;font-size:20px}
.keybox{background:rgba(255,159,0,.08);border:1px solid rgba(255,159,0,.35);border-radius:12px;padding:15px 20px}
.keybox .kh{display:flex;align-items:center;gap:8px;color:#ff9f00;font-weight:800;font-size:17px;margin-bottom:11px}
.keybox .kh .material-icons{font-size:20px}
.kpts{display:flex;gap:18px;margin-bottom:10px;flex-wrap:wrap}
.kpt{display:flex;align-items:center;gap:8px;font-size:14px;color:#e7ebf3}
.knum{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#00d9ff,#7aa6ff);color:#06121e;
 font-family:"Orbitron";font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;flex:none}
.knote{font-size:13.5px;color:#9aa7bd;border-top:1px solid rgba(255,255,255,.06);padding-top:10px}.knote b{color:#ffb84d}
</style></head><body><div class="slide"><div class="grid"></div>
<header><div class="kicker"><span class="material-icons" style="font-size:17px;">layers</span>核心概念 · OVERVIEW</div><h1 class="t">四层分类：L0–L3 总览</h1><div class="rule"></div></header>
<main style="display:flex;align-items:center;gap:36px">
<div style="flex:none;width:560px;display:flex;flex-direction:column;align-items:center;gap:12px"><div style="width:46%;background:rgba(255,255,255,.08);color:#dfe4ef;border:1px solid rgba(255,255,255,.14);border-radius:13px;padding:0 24px;height:92px;display:flex;align-items:center;gap:16px"><span class="title-font" style="font-size:23px;font-weight:900">L0</span><div><div style="font-size:22px;font-weight:900">纯人</div><div style="font-size:13px;font-weight:700;opacity:.8;margin-top:2px">机器不碰</div></div></div><div style="width:66%;background:rgba(0,217,255,.16);color:#cdf3fb;border:1px solid rgba(0,217,255,.5);border-radius:13px;padding:0 24px;height:92px;display:flex;align-items:center;gap:16px"><span class="title-font" style="font-size:23px;font-weight:900">L1</span><div><div style="font-size:22px;font-weight:900">人主导</div><div style="font-size:13px;font-weight:700;opacity:.8;margin-top:2px">机器当副驾</div></div></div><div style="width:84%;background:linear-gradient(135deg,#00d9ff,#3b82e6);color:#06121e;border-radius:13px;padding:0 24px;height:92px;display:flex;align-items:center;gap:16px"><span class="title-font" style="font-size:23px;font-weight:900">L2</span><div><div style="font-size:22px;font-weight:900">协同</div><div style="font-size:13px;font-weight:700;opacity:.8;margin-top:2px">机器出方案·人拍板</div></div></div><div style="width:100%;background:linear-gradient(135deg,#ff9f00,#ff7a00);color:#1a1208;border-radius:13px;padding:0 24px;height:92px;display:flex;align-items:center;gap:16px"><span class="title-font" style="font-size:23px;font-weight:900">L3</span><div><div style="font-size:22px;font-weight:900">全自主</div><div style="font-size:13px;font-weight:700;opacity:.8;margin-top:2px">机器端到端·人抽查</div></div></div></div>
<div style="flex:1;display:flex;flex-direction:column;gap:13px">
<div class="card" style="font-size:15px;line-height:1.6;color:#cfd7e6;background:rgba(255,159,0,.07);border-color:rgba(255,159,0,.3)">底层 <b style="color:#ffb84d">L3</b> 最宽——HR <b style="color:#ffb84d">60%+</b> 工时压在这里，正是 AI 最该接管的部分。</div>
<div class="card" style="font-size:15px;line-height:1.6;color:#cfd7e6;">中间 <b style="color:#00d9ff">L2</b> 是 AI 价值密度最高的一层：机器出方案+证据链，人 5 分钟拍板。</div>
<div class="card" style="font-size:15px;line-height:1.6;color:#cfd7e6;">往上 <b style="color:#00d9ff">L1</b> 是人的主场；顶层 <b style="color:#fff">L0</b> 是 AI 禁区，永远不下沉。</div>
<div class="card" style="font-size:15px;line-height:1.6;color:#cfd7e6;background:rgba(255,159,0,.07);border-color:rgba(255,159,0,.3)">目标：在合规允许下，把任务<b style="color:#ffb84d">尽量下沉到 L3</b>，把人解放到判断与关系上。</div>
</div></main><div class="pageno">03 / 11</div></div></body></html>
